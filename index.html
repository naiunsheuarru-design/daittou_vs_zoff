<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zoff・大東建託 適性診断</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
<section id="start" class="card">
  <p class="eyebrow">新卒向け・64問</p>
  <h1>Zoff・大東建託<br>適性診断</h1>
  <p class="intro">性格、行動傾向、働き方の好みをもとに、Zoffの店舗マネジメントと大東建託の事務系総合職への相性を比較します。</p>
  <ul class="start-list">
    <li>通常質問58問＋ケース問題6問</li>
        <li>質問は毎回ランダム表示</li>
    <li>回答の一貫性も確認</li>
  </ul>
  <button id="startBtn" class="primary">診断を始める</button>
  <small>所要時間の目安：7〜9分</small>
</section>

<section id="quiz" class="card hidden">
  <div class="top"><span id="counter"></span><span id="percent"></span></div>
  <div class="progress"><div id="progressFill"></div></div>
  <p id="typeLabel" class="eyebrow"></p>
  <h2 id="questionText"></h2>
  <div id="answers" class="answers"></div>
  <button id="backBtn" class="back">← 1つ前に戻る</button>
</section>

<section id="result" class="card hidden">
  <p class="eyebrow">診断結果</p>
  <h1 id="resultTitle"></h1>
  <p id="resultLead" class="intro"></p>

  <div class="company-grid">
    <div class="company-card">
      <span>Zoff</span><strong id="zoffScore"></strong>
      <div class="bar"><div id="zoffBar"></div></div>
    </div>
    <div class="company-card">
      <span>大東建託</span><strong id="daitoScore"></strong>
      <div class="bar"><div id="daitoBar"></div></div>
    </div>
  </div>

  <div class="panel">
    <h3>判定のポイント</h3>
    <ul id="reasons"></ul>
  </div>

  <div class="panel">
    <h3>能力・価値観の傾向</h3>
    <div id="traits"></div>
  </div>

  <div class="panel compact">
    <h3>回答の信頼度</h3>
    <p id="reliability"></p>
  </div>

  <div id="cautionPanel" class="panel caution hidden">
    <h3>二社以外も少し確認</h3>
    <p id="cautionText"></p>
  </div>

  <button id="restartBtn" class="primary">もう一度診断する</button>
</section>
</main>
<script src="script.js"></script>
</body>
</html>
